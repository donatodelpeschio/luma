<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luma Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<header id="hero">
    <h1>Luma</h1>
    <p>Beautiful console logs & toast notifications</p>
    <div class="hero-buttons">
        <button id="try">Try it</button>
        <a href="https://github.com/DonatoDelPeschio/luma" target="_blank">GitHub</a>
        <a href="https://www.paypal.com/paypalme/mailboxporter" target="_blank">Donate ❤️</a>
    </div>
</header>

<!-- PLAYGROUND -->
<section id="playground">
    <h2>Playground</h2>
    <div class="buttons">
        <!-- Logs -->
        <button data-action="log">Log</button>
        <button data-action="success">Success</button>
        <button data-action="error">Error</button>
        <button data-action="warn">Warn</button>
        <button data-action="info">Info</button>

        <!-- Toasts -->
        <button data-action="toast-success">Toast Success</button>
        <button data-action="toast-error">Toast Error</button>
        <button data-action="toast-warn">Toast Warn</button>
        <button data-action="toast-info">Toast Info</button>

        <!-- Box -->
        <button data-action="box">Box</button>

        <!-- Group -->
        <button data-action="group">Group</button>
        <button data-action="groupEnd">Group End</button>

        <!-- Timer -->
        <button data-action="timer">Timer</button>

    </div>
</section>

<!-- CONSOLE EMULATOR -->
<section id="console">
    <h2>Console Output</h2>
    <div class="console-hint">Open browser console for a better experience</div>
    <div id="console-output"></div>
</section>

<!-- CODE VIEWER -->
<section id="code-viewer">
    <h2>Code</h2>
    <pre><code id="code-block"></code></pre>
</section>

<!-- INSTALLATION -->
<section id="installation">
    <h2>Installation</h2>
    <pre><code>
&lt;script src="https://cdn.jsdelivr.net/npm/luma-console/dist/luma.min.js"&gt;&lt;/script&gt;
</code></pre>
</section>

<!-- FOOTER -->
<footer>
    <p>Made with ❤️ by Donato del Peschio</p>
    <a href="https://paypal.me/DonatoDelPeschio" target="_blank">Donate</a>
</footer>


<script src="../dist/luma.js"></script>
<script src="script.js"></script>

</body>
</html>
